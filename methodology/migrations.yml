# methodology/migrations.yml — declarative SSD convention-migration manifest (ADR-0013).
#
# One entry per SSD release that changed a PROJECT-VISIBLE convention. `/ssd upgrade` reads this
# (via methodology/migrate.sh) to tell a project what conventions it has drifted past, and — from
# iter B — to migrate it forward.
#
# Append-only, ordered by introduced_in. Each entry:
#   id            stable kebab-case key (primary key; never renamed/reused)
#   introduced_in library version that added the convention (the selection key)
#   obsoleted_in  (optional) library version that RETIRED the convention. A project upgrading to a
#                 target >= obsoleted_in no longer sees the entry — the convention does not exist in
#                 the destination world, so it is never (re-)applied. A staged upgrade to a target
#                 BELOW obsoleted_in still sees it (that target still had the convention). This is how
#                 an append-only manifest expresses removal without deleting the (stable) id. Added
#                 v2.2.0 (ssd-2.0-cuts iter C, ADR-0012/0013) when SSD 2.0 removed the profile keys.
#   applies_to    project | library   (`/ssd upgrade` runs only `project`-scoped entries)
#   kind          mechanical | guided (guided = a practice; cannot be auto-applied)
#   adr           the decision record that introduced it
#   title         one-line human description
#   detect        HUMAN description of the idempotency probe. The executable probe lives in
#                 migrate.sh as detect_<id-with-underscores>(); guided entries have detect: null.
#   apply         (mechanical) HUMAN description of the migration action (executed in iter B+)
#   guidance      (guided) what the maintainer should adopt by hand
#
# NOTE: `apply` text is the HUMAN description of the mechanical migration; the executable action
#       lives in migrate.sh as apply_<id-with-underscores>() (`--apply`). As of v1.23.0 all four
#       mechanical entries — including `current-yml-v2` (v1→v2 split, conservative-safe form) — have
#       an executable apply. `guidance` text (guided entries) is informational — guided practices are
#       adopted by hand, never auto-applied.

schema_version: 1

migrations:
  - id: current-yml-v2
    introduced_in: "1.4.0"
    applies_to: project
    kind: mechanical
    adr: ADR-0002
    title: "current.yml v2 schema + current.notes.yml sidecar"
    detect: "current.yml contains 'schema_version: 2'"
    apply: "split legacy v1 current.yml into v2 machine state + current.notes.yml sidecar (.bak first)"

  - id: dev-profile-keys
    introduced_in: "1.10.0"
    # retired in SSD 2.0 (ADR-0012); see guided entry profile-concept-removed. Comment on its own line:
    # an inline `# …` after the value would leak into the parsed obsoleted_in (iter-B MAJOR-4 class).
    obsoleted_in: "2.0.0"
    applies_to: project
    kind: mechanical
    adr: ADR-0004
    title: "developer_profile + teaching_mode keys in project.yml"
    detect: "project.yml ssd block has 'developer_profile'"
    apply: "add developer_profile: standard + teaching_mode block (defaults) if absent (non-destructive merge)"

  - id: parallel-features-keys
    introduced_in: "1.15.0"
    applies_to: project
    kind: mechanical
    adr: ADR-0007
    title: "project.yml.ssd.{branch_pattern,worktree_root,worktree_name_pattern,switch_note_default}"
    detect: "project.yml ssd block has 'branch_pattern'"
    apply: "add the four ssd.* keys with documented defaults if absent (non-destructive merge)"

  - id: selective-gitignore
    introduced_in: "1.18.0"
    applies_to: project
    kind: mechanical
    adr: ADR-0008
    title: "selective .ssd/ commit split (gitignore_mode + selective .gitignore pattern)"
    detect: "project.yml ssd block has 'gitignore_mode'"
    apply: "set gitignore_mode: selective; rewrite .gitignore to the selective pattern (.gitignore.bak first)"

  - id: decision-record-doctrine
    introduced_in: "1.20.1"
    applies_to: project
    kind: guided
    adr: ADR-0011
    title: "decisions = ADR + revisit-aware tracking issue"
    detect: null
    guidance: "Adopt the ADR + revisit-aware tracking-issue pattern (with a falsifiable 'Revisit when:') for consequential decisions."

  - id: profile-concept-removed
    introduced_in: "2.0.0"
    applies_to: project
    kind: guided
    adr: ADR-0012
    title: "developer_profile / teaching_mode removed from project.yml (now ignored)"
    detect: null
    guidance: "SSD 2.0 removed the profile concept. Delete the 'developer_profile' key and the 'teaching_mode:' block from .ssd/project.yml — 2.0 ignores them (no crash), but they are dead config. Progressive disclosure (no-arg /ssd Auto-Detect) replaces tiered guidance; the escape-hatch chapters replace expert depth-on-demand."

  - id: single-surface-doctrine
    introduced_in: "2.0.0"
    applies_to: project
    kind: guided
    adr: ADR-0012
    title: "one surface, progressively disclosed — commands are a thin alias, not a co-equal surface"
    detect: null
    guidance: "SSD 2.0 collapsed the dual-surface 'perfect parity' doctrine. The conversational/no-arg /ssd path is primary; /ssd <verb> is a thin alias that lowers into it, not a separate stateful surface. The full verb set is retained as a discoverable escape hatch in ssd/chapters/. No project.yml change is required — this entry exists so a v1-era project learns the doctrine shift on /ssd upgrade (R3 re-surfacing)."
